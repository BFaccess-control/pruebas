<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Acceso Prosud</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.19.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h2>🔑 Control de Acceso</h2>
            <input type="email" id="login-email" placeholder="Correo" autocomplete="off">
            <input type="password" id="login-password" placeholder="Contraseña" autocomplete="off">
            <button id="btn-login" class="btn-save">Entrar al Sistema</button>
        </div>
    </div>

    <div id="app-body" style="display:none;">
        <header>
            <h1>Control Prosud</h1>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button id="btn-logout" class="logout-link">Cerrar Sesión</button>
            </div>
        </header>

        <div class="tabs">
            <button class="tab-btn active" id="btn-tab-transporte">🚍 Transporte</button>
            <button class="tab-btn" id="btn-tab-visitas">🧍 Visitas</button>
            <button class="tab-btn" id="btn-tab-abastecimiento">📦 Abastecimiento</button>
        </div>

        <div id="admin-panel" class="admin-controls" style="display: none; padding: 15px; background: #eef2f3; justify-content: center; gap: 15px;">
            <button id="btn-abrir-reportes" class="btn-save" style="background-color: #28a745;">📊 Reportes Excel</button>
            <button id="btn-gestionar-guardias" class="btn-save" style="display: none;">👥 Gestionar Guardias</button>
            <button id="btn-abrir-modal" class="btn-save" style="display: none; background-color: #17a2b8;">📝 Maestro Conductor</button>
        </div>

        <main class="container">
            <section id="sec-transporte" class="tab-content active">
                <div class="card">
                    <h3>Registro de Transporte</h3>
                    <form id="form-transporte">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <input type="text" id="t-rut" placeholder="RUT Conductor" required>
                            <select id="t-guardia-id" required><option value="">Guardia...</option></select>
                        </div>
                        <input type="text" id="t-nombre" placeholder="Nombre Completo" required>
                        <input type="text" id="t-empresa" placeholder="Empresa" required>
                        <input type="text" id="t-patente" placeholder="Patente" required maxlength="7">
                        <button type="submit" class="btn-save">Registrar Ingreso</button>
                    </form>
                </div>
            </section>

            <section id="sec-visitas" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>Registro de Visitas</h3>
                    <form id="form-visitas">
                        <input type="text" id="v-rut" placeholder="RUT Visita" required>
                        <input type="text" id="v-nombre" placeholder="Nombre Completo" required>
                        <input type="text" id="v-representa" placeholder="Empresa que representa" required>
                        <input type="text" id="v-motivo" placeholder="Motivo de visita" required>
                        <div class="toggle-container">
                            <span>¿Ingresa con vehículo?</span>
                            <input type="checkbox" id="v-check-vehiculo">
                        </div>
                        <input type="text" id="v-patente" placeholder="Patente Vehículo" style="display:none;" maxlength="7">
                        <select id="v-guardia-id" required><option value="">Guardia...</option></select>
                        <button type="submit" class="btn-save">Registrar Visita</button>
                    </form>
                </div>
            </section>

            <section id="sec-abastecimiento" class="tab-content" style="display:none;">
                <div class="card">
                    <h3>Ingreso Abastecimiento</h3>
                    <form id="form-abastecimiento">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div class="autocomplete-container">
                                <input type="text" id="a-rut" placeholder="RUT Conductor" required autocomplete="off">
                                <div id="a-sugerencias-rut" class="sugerencias-box"></div>
                            </div>
                            <select id="a-guardia-id" required><option value="">Guardia...</option></select>
                        </div>
                        
                        <input type="text" id="a-nombre" placeholder="Nombre Completo" required autocomplete="off">

                        <select id="a-empresa" required style="width: 100%; padding: 10px; margin-top: 10px; border-radius: 4px; border: 1px solid #ccc;">
                            <option value="">-- Seleccione Empresa --</option>
                            <option value="PROSUD">PROSUD</option>
                            <option value="TRANS-LOG">TRANS-LOG</option>
                            <option value="EXTERNO">EXTERNO / OTRO</option>
                        </select>

                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px;">
                            <input type="text" id="a-patente" placeholder="Patente Camión" required maxlength="7">
                            <input type="text" id="a-rampla" placeholder="Patente Rampla" maxlength="7">
                        </div>
                        <input type="text" id="a-guia" placeholder="Número de Guía" required style="margin-top: 10px;">
                        <button type="submit" class="btn-save" style="margin-top: 15px;">Registrar Ingreso</button>
                    </form>
                </div>

                <div class="card" style="margin-top: 20px;">
                    <h3>Camiones en Recinto</h3>
                    <div style="overflow-x: auto;">
                        <table style="width: 100%; border-collapse: collapse; margin-top: 10px;">
                            <thead>
                                <tr style="background: var(--azul-oscuro); color: white;">
                                    <th style="padding: 10px;">Conductor</th>
                                    <th>Vehículo</th>
                                    <th>Ingreso</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-abastecimiento-recinto" style="text-align: center;">
                                </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-confirmar-salida" class="modal">
        <div class="modal-content" style="max-width: 400px; border-top: 5px solid #d9534f;">
            <h3 style="color: #d9534f;">⚠️ Confirmar Salida</h3>
            <div id="detalle-salida-camion" style="text-align: left; background: #f9f9f9; padding: 15px; border-radius: 8px; margin: 15px 0; border: 1px solid #eee; line-height: 1.6;"></div>
            <p style="margin-bottom: 20px; font-weight: bold;">¿Estás seguro que deseas dar salida a este camión?</p>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="btn-confirmar-salida-final" class="btn-save" style="background-color: #d9534f;">SÍ, CONFIRMAR</button>
                <button id="btn-cancelar-salida" class="btn-cancel" style="background-color: #6c757d;">CANCELAR</button>
            </div>
        </div>
    </div>

    <div id="modal-reportes" class="modal">
        <div class="modal-content">
            <h3>📊 Exportar Reportes Excel</h3>
            <div style="display: flex; flex-direction: column; gap: 10px; text-align: left;">
                <label>Fecha Inicio:</label>
                <input type="date" id="fecha-inicio" required>
                <label>Fecha Fin:</label>
                <input type="date" id="fecha-fin" required>
                <label>Tipo:</label>
                <select id="filtro-tipo">
                    <option value="TODOS">Todos</option>
                    <option value="TRANSPORTE">Transporte</option>
                    <option value="VISITAS">Visitas</option>
                    <option value="ABASTECIMIENTO">Abastecimiento</option>
                </select>
            </div>
            <div class="modal-footer" style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
                <button id="btn-exportar" class="btn-save">Generar Excel</button>
                <button id="btn-cerrar-reportes" class="btn-cancel">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module" src="jsapp.js"></script>
</body>
</html>
